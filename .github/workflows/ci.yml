        echo "📦 Image size: $IMAGE_SIZE"
        SIZE_BYTES=$(docker inspect aagjalpankaj/alpine:${{ env.ALPINE_VERSION }}-yq --format='{{.Size}}')
        MAX_SIZE_BYTES=12582912  # 12MB in bytes
        if [ "$SIZE_BYTES" -gt "$MAX_SIZE_BYTES" ]; then
